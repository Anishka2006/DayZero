<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | DayZero</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  background: #f8fafc;
  color: #0f172a;
}

/* CONTAINER */
.container {
  width: min(1120px, calc(100% - 48px));
  margin: 0 auto;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  background: rgba(248, 250, 252, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #e2e8f0;
}

.navbar-inner {
  min-height: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 1.4rem;
  font-weight: 800;
  color: #4f46e5;
}

/* BUTTON */
.btn {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

.btn-primary {
  background: #4f46e5;
  color: white;
}

.btn-secondary {
  background: white;
  border: 1px solid #cbd5e1;
  color: #4f46e5;
}

.btn:hover {
  transform: translateY(-2px);
}

/* SECTION */
section {
  padding: 80px 0;
}

.section-heading {
  text-align: center;
  margin-bottom: 40px;
}

.section-heading h2 {
  font-size: 2rem;
  margin-bottom: 10px;
}

.section-heading p {
  color: #64748b;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 10px 20px rgba(15, 23, 42, 0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #4f46e5;
}

/* ICON */
.icon {
  font-size: 22px;
  background: #eef2ff;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  margin-bottom: 12px;
}

/* TEXT */
.card h3 {
  font-size: 1.1rem;
  margin-bottom: 6px;
}

.card p {
  font-size: 0.95rem;
  color: #64748b;
}

.score {
  font-size: 1.8rem;
  font-weight: bold;
  color: #4f46e5;
  margin-top: 10px;
}

.status {
  margin-top: 10px;
  font-weight: 600;
  color: #f59e0b;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container navbar-inner">
    <div class="logo">DayZero 🚀</div>
    <button class="btn btn-secondary" onclick="logout()">Logout</button>
  </div>
</header>

<!-- MAIN -->
<section>
  <div class="container">

    <div class="section-heading">
      <h2 id="welcomeText">Welcome</h2>
      <p>Your performance is being assessed in real-time</p>
    </div>

    <div class="grid">

      <!-- Simulation -->
      <div class="card">
        <div class="icon">⚡</div>
        <h3>Live Simulation</h3>
        <p>Work on real interview tasks</p>
        <button class="btn btn-primary" style="margin-top:10px;width:100%;">
          Start
        </button>
      </div>

      <!-- Score -->
      <div class="card">
        <div class="icon">📊</div>
        <h3>Technical Score</h3>
        <p>Coding & problem solving</p>
        <div class="score">78%</div>
      </div>

      <!-- Communication -->
      <div class="card">
        <div class="icon">💬</div>
        <h3>Communication</h3>
        <p>Clarity of explanation</p>
        <div class="score">72%</div>
      </div>

      <!-- Status -->
      <div class="card">
        <div class="icon">⏳</div>
        <h3>Hiring Status</h3>
        <p>Evaluation progress</p>
        <div class="status">Under Review</div>
      </div>

    </div>

  </div>
</section>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (user) {
  document.getElementById("welcomeText").innerText =
    `Welcome, ${user.name}`;
} else {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
